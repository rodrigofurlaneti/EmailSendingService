name: Publish NuGet to GitHub Packages

# Publica os pacotes ao criar um Release no GitHub, ou manualmente pela aba Actions.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Pack & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore EmailSendingService.sln

      - name: Build (Release)
        run: dotnet build EmailSendingService.sln --configuration Release --no-restore

      # Só empacota projetos com <IsPackable>true</IsPackable>
      # (Domain, Application e Infrastructure).
      - name: Pack
        run: dotnet pack EmailSendingService.sln --configuration Release --no-build -o ./artifacts

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          if-no-files-found: warn
